# =============================================================================
# Конфигурация модуля рекомендаций
# =============================================================================

# Путь к интерпретатору Python
# Используйте "python" или "python3" если Python в PATH,
# иначе укажите полный путь (например, "C:\\Python313\\python.exe")
python.executable=python

# Путь к скрипту рекомендаций (относительно корня проекта)
# Скрипт должен находиться в директории ML-Recommendation/
recommendation.script.path=../ML-Recommendation/recommendation_engine.py

# Количество рекомендаций по умолчанию
recommendation.default.topn=10

# Вес коллаборативной фильтрации (0.0 - 1.0)
# 0.6 = 60% коллаборативная, 40% контентная
recommendation.alpha=0.6

# Включить/выключить модуль рекомендаций
# true = модуль активен, false = модуль не загружается
recommendation.enabled=false
