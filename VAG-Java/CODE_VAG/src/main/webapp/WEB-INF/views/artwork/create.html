<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание публикации - Виртуальная арт-галерея</title>
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container">
    <h1>Создать новую публикацию</h1>

    <!-- Flash-сообщения -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${warning}" class="alert alert-warning" th:text="${warning}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form id="uploadForm" th:action="@{/artwork/create}" th:object="${artwork}" method="post">
        <input type="hidden" name="exhibitionId" th:value="${exhibitionId}">
        <input type="hidden" name="imagePath" id="imagePath">
        <input type="hidden" name="safeFileName" id="safeFileName">

        <div class="form-group">
            <label for="title">Название</label>
            <input type="text" id="title" th:field="*{title}" required class="form-control">
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" th:field="*{description}" class="form-control"></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error"></span>
        </div>

        <div class="form-group">
            <label for="categories">Категории</label>
            <select multiple="multiple" id="categories" name="categoryIds" class="form-control" required>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"
                        th:selected="${#lists.contains(selectedCategoryIds, category.id)}">
                </option>
            </select>
            <small class="form-text text-muted">Выберите несколько категорий, удерживая клавишу CTRL</small>
        </div>

        <div class="form-group">
            <label>Изображение</label>
            <div class="custom-file-input">
                <input type="file"
                       id="imageFile"
                       accept="image/jpeg,image/png,image/webp,image/jpg"
                       onchange="handleFileSelect(this)">
                <label for="imageFile" class="custom-file-label">Выберите файл</label>
            </div>

            <!-- Прогресс-бар -->
            <div id="progressContainer" style="display:none; margin-top: 10px;">
                <div style="background: #e0e0e0; border-radius: 10px; height: 20px; width: 100%;">
                    <div id="progressBarFill" style="background: #4CAF50; height: 100%; width: 0%; border-radius: 10px; transition: width 0.3s;"></div>
                </div>
                <span id="progressText" style="display: block; text-align: center; margin-top: 5px;">0%</span>
            </div>

            <!-- Предпросмотр -->
            <div class="preview-container">
                <img id="preview" class="image-preview">
            </div>
            <span id="fileError" class="error" style="display:none;"></span>
        </div>

        <div class="btn-center-wrapper">
            <button type="submit" id="submitBtn" class="btn btn-primary" disabled>
                <span id="btnText">Создать публикацию</span>
                <span id="btnSpinner" style="display:none;">Идёт модерация...</span>
            </button>
            <a th:href="@{/user/profile}" class="btn btn-secondary">Отменить</a>
        </div>
    </form>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>
let isUploading = false;
let isSubmitting = false;

async function handleFileSelect(input) {
    const file = input.files[0];
    const submitBtn = document.getElementById('submitBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBarFill = document.getElementById('progressBarFill');
    const progressText = document.getElementById('progressText');
    const fileError = document.getElementById('fileError');
    const fileLabel = input.nextElementSibling;
    const preview = document.getElementById('preview');

    if (!file) {
        submitBtn.disabled = true;
        return;
    }

    // Показываем предпросмотр
    const reader = new FileReader();
    reader.onload = function(e) {
        preview.src = e.target.result;
        preview.style.display = 'block';
    };
    reader.readAsDataURL(file);

    fileLabel.innerHTML = file.name.length > 30 ? file.name.substring(0, 27) + '...' : file.name;

    // Проверяем размер (30 МБ макс)
    if (file.size > 30 * 1024 * 1024) {
        fileError.textContent = 'Файл слишком большой (максимум 30 МБ)';
        fileError.style.display = 'block';
        submitBtn.disabled = true;
        return;
    }

    fileError.style.display = 'none';
    submitBtn.disabled = true;
    progressContainer.style.display = 'block';
    progressText.textContent = 'Получение ссылки...';
    isUploading = true;

    try {
        // 1. Получаем presigned URL
        const response = await fetch(
            `/vag/artwork/upload-url?fileName=${encodeURIComponent(file.name)}&contentType=${encodeURIComponent(file.type)}`
        );

        if (!response.ok) throw new Error('Ошибка сервера: ' + response.status);

        const data = await response.json();

        // 2. Загружаем файл напрямую в MinIO
        await uploadToMinIO(file, data.presignedUrl, progressBarFill, progressText);

        // 3. Сохраняем путь
        document.getElementById('imagePath').value = data.objectKey;
        document.getElementById('safeFileName').value = data.safeFileName;

        progressText.textContent = 'Загрузка завершена!';
        submitBtn.disabled = false;
        isUploading = false;

    } catch (error) {
        progressText.textContent = 'Ошибка: ' + error.message;
        fileError.textContent = 'Ошибка загрузки: ' + error.message;
        fileError.style.display = 'block';
        console.error('Upload error:', error);
        isUploading = false;
    }
}

function uploadToMinIO(file, presignedUrl, progressBarFill, progressText) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressBarFill.style.width = percent + '%';
                progressText.textContent = 'Загрузка: ' + percent + '%';
            }
        });

        xhr.addEventListener('load', () => {
            if (xhr.status === 200) resolve();
            else reject(new Error('Ошибка MinIO: ' + xhr.status));
        });

        xhr.addEventListener('error', () => reject(new Error('Сетевая ошибка')));
        xhr.open('PUT', presignedUrl);
        xhr.setRequestHeader('Content-Type', file.type);
        xhr.send(file);
    });
}

// БЛОКИРОВКА ДВОЙНОЙ ОТПРАВКИ ФОРМЫ
document.getElementById('uploadForm').addEventListener('submit', function(e) {
    if (isSubmitting) {
        e.preventDefault();
        return false;
    }

    if (isUploading) {
        e.preventDefault();
        alert('Дождитесь завершения загрузки файла!');
        return false;
    }

    // Блокируем кнопку
    isSubmitting = true;
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    submitBtn.disabled = true;
    btnText.style.display = 'none';
    btnSpinner.style.display = 'inline';

    // Разблокируем через 30 секунд (на случай ошибки)
    setTimeout(function() {
        if (isSubmitting) {
            isSubmitting = false;
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            btnSpinner.style.display = 'none';
        }
    }, 30000);

    return true;
});
</script>
</body>
</html>
