<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Отклонение публикации - Виртуальная арт-галерея</title>
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container">
    <h1>Отклонение публикации</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="artwork-info" style="margin-bottom: 20px;">
        <h3 th:text="${artwork.title}"></h3>
        <p><strong>Автор:</strong> <span th:text="${artwork.user.username}"></span></p>
        <p><strong>Статус:</strong> 
            <span th:switch="${artwork.status}">
                <span th:case="'PENDING'">Ожидает проверки</span>
                <span th:case="'APPROVED'">Одобрена</span>
                <span th:case="'REJECTED'">Отклонена</span>
                <span th:case="*">[[${artwork.status}]]</span>
            </span>
        </p>
    </div>

    <form th:action="@{/admin/artworks/reject/{id}(id=${artwork.id})}" method="post">
        <div class="form-group">
            <label for="rejectionReason">Причина отклонения <span style="color: red;">*</span></label>
            <textarea id="rejectionReason" name="rejectionReason" 
                      required 
                      class="form-control" 
                      rows="5" 
                      placeholder="Укажите причину отклонения публикации..."></textarea>
            <small class="form-text text-muted">Обязательно укажите причину, почему публикация отклоняется.</small>
        </div>

        <div class="btn-center-wrapper">
            <button type="submit" class="btn btn-danger">Отклонить публикацию</button>
            <a th:href="@{/admin/artworks}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
