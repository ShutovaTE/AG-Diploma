<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>
<header th:fragment="header">
    <nav>
        <div class="logo">
            <a th:href="@{/index}">Арт-галерея</a>
        </div>

        <div class="nav-links">
            <a th:href="@{/artwork/list}">Публикации</a>
            <a th:href="@{/exhibition/list}">Выставки</a>
            <a th:href="@{/category/list}">Категории</a>
            <a th:href="@{/user/list}">Художники</a>
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/artworks}">Админ-панель</a>
            </div>

            <div sec:authorize="isAuthenticated()">
                <details class="notification-menu" id="notificationMenu" th:data-mark-read-url="@{/user/notifications/mark-read}">
                    <summary class="notification-bell" id="notificationBell">
                        🔔
                        <span th:if="${unreadNotificationsCount > 0}"
                              class="notification-badge"
                              id="notificationBadge"
                              th:text="${unreadNotificationsCount > 99 ? '99+' : unreadNotificationsCount}"></span>
                    </summary>
                    <div class="notification-dropdown">
                        <h4>Недавние уведомления</h4>
                        <div th:if="${recentNotifications == null || #lists.isEmpty(recentNotifications)}" class="notification-empty">
                            Пока уведомлений нет
                        </div>
                        <div th:unless="${recentNotifications == null || #lists.isEmpty(recentNotifications)}">
                            <th:block th:each="notification : ${recentNotifications}">
                                <a th:if="${notification.targetLink != null}"
                                   th:href="@{${notification.targetLink}}"
                                   class="notification-item">
                                    <span th:text="${notification.message}"></span>
                                    <small th:text="${#temporals.format(notification.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
                                </a>
                                <a th:unless="${notification.targetLink != null}"
                                   th:href="@{/user/notifications}"
                                   class="notification-item">
                                    <span th:text="${notification.message}"></span>
                                    <small th:text="${#temporals.format(notification.createdAt, 'dd.MM.yyyy HH:mm')}"></small>
                                </a>
                            </th:block>
                        </div>
                        <a th:href="@{/user/notifications}" class="notification-all-link">Посмотреть все уведомления</a>
                    </div>
                </details>
                <a th:href="@{/user/profile}">Мой профиль</a>
                <a th:href="@{/user/liked}">Понравившееся</a>
                <form th:action="@{/auth/logout}" method="post">
                    <button class="btn btn-primary" type="submit">Выйти</button>
                </form>
            </div>

            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/auth/login}">Войти</a>
                <a th:href="@{/auth/register}">Зарегистрироваться</a>
            </div>

        </div>
    </nav>
</header>
<script>
    (function () {
        const menu = document.getElementById('notificationMenu');
        const bell = document.getElementById('notificationBell');
        const badge = document.getElementById('notificationBadge');
        if (!menu || !bell) return;

        let alreadyMarked = false;

        const hideBadgeAndMarkRead = function () {
            if (badge) {
                badge.style.display = 'none';
            }
            if (alreadyMarked) return;
            alreadyMarked = true;

            const url = menu.getAttribute('data-mark-read-url');
            if (!url) return;

            fetch(url, {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            }).catch(function () {
                // ignore network error; UI stays updated
            });
        };

        bell.addEventListener('click', hideBadgeAndMarkRead);
    })();
</script>
</body>
</html>
